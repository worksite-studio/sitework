inated Sums",pct:1},{code:"043",desc:"Appliances \u2014 Purchased by Client",pct:0},{code:"044",desc:"Structural Steel and Metal Fabrication",pct:3}]}],wi={gettingStarted:[{id:"gs-1",title:"Welcome to SITEWORK",body:`SITEWORK is a construction finance platform built for Australian builders, project managers and site administrators. It replaces spreadsheets and disconnected tools with a single system for tracking, managing and forecasting project costs.

This guide will walk you through the core modules and how they connect. SITEWORK is designed around the way Australian construction projects actually run \u2014 from the first lead through to Final Financial Completion.`,steps:["Create your first project or import an estimate","Set up your cost codes using a BOQ template or from scratch","Add your subcontractors to the compliance register","Connect Xero to sync your invoices automatically","Start logging site diary entries and tracking variations"]},{id:"gs-2",title:"Your first project",body:`Every project in SITEWORK starts with three things: a client, a contract value, and a set of cost codes. Cost codes are the backbone of the system \u2014 they're how you track where every dollar is budgeted, committed and spent.

We recommend starting from a BOQ template, which gives you a realistic cost code structure pre-seeded with industry-standard percentage splits. You can then adjust the budgets to match your estimate.`,steps:["Go to Projects and click New Project","Select a client or add a new one","Choose a BOQ template that matches your project type","Enter your overall project budget \u2014 SITEWORK will split it across codes automatically","Add your subcontractors under the Subcontractors tab"]},{id:"gs-3",title:"Connecting Xero",body:`SITEWORK integrates directly with Xero through OAuth 2.0 \u2014 meaning your financial data stays in sync without double entry. Once connected, invoices you approve in SITEWORK can be pushed directly to Xero as bills, and payments reconciled back.

The Xero connection is two-way: SITEWORK reads supplier contacts and bank accounts from Xero, and writes bills and cost allocations back. This is your primary tool for reducing admin time.`,steps:["Go to Settings > Integrations","Click Connect Xero and authorise through Xero's login page","Map your Xero accounts to SITEWORK cost code categories","Enable auto-sync for approved invoices","Review synced transactions in the Invoices tab \u2014 look for the Xero indicator"]}],modules:[{id:"mod-1",title:"BOQ & Budget",body:`The Bill of Quantities (BOQ) is the financial backbone of each project. It breaks your contract down into cost codes \u2014 each with a budget, committed amount, actual spend, and variance. SITEWORK calculates your RAG status (on budget / at risk / over) automatically as you log costs.

Cost codes can contain line items \u2014 detailed breakdowns by labour, material and subcontractor. This is where Rawlinson rate lookup integrates, giving you benchmark pricing for each item.`,tip:"Use the Rawlinson Rate Lookup when creating line items to benchmark your rates against current Australian market data."},{id:"mod-2",title:"Variations",body:`Variations are changes to the contract scope. Every variation should be logged in SITEWORK before work commences \u2014 with a cost code, amount, description and status. Approved variations automatically update your committed costs.

Pending variations are flagged on the Dashboard so nothing slips through. SITEWORK tracks your total approved variation value separately from your original contract, giving you a clear picture of your true contract sum at any point.`,tip:"Log every verbal variation immediately, even as Pending. A variation registered and declined is better than one that never existed."},{id:"mod-3",title:"Progress Claims & Invoices",body:`SITEWORK manages two types of invoices: subcontractor/supplier invoices (cost side) and progress claims to your client (revenue side). The Invoices module handles the cost side \u2014 each invoice is allocated to a cost code, approved, and synced to Xero.

For progress claims, SITEWORK uses milestone-based claim schedules tied to your Schedule module. Claim periods show what's been certified, what's been paid, and what's outstanding \u2014 the data you need for cash flow forecasting.`,tip:"Always allocate invoices to a cost code immediately. Unallocated invoices make your BOQ unreliable."},{id:"mod-4",title:"Retention & FFC",body:`Retention is money held back from progress payments \u2014 typically 5% under HIA and MBA contracts \u2014 until Practical Completion (PC) and the end of the Defects Liability Period (DLP). SITEWORK tracks retention separately from your main cash flow so you always know what's held and when it's due.

Final Financial Completion (FFC) is the moment all claims are settled and the final retention is releasable. SITEWORK generates FFC certificates and tracks the timeline from PC through to DLP end date.`,tip:"Set your PC date and DLP months when the project starts, not when completion is approaching. SITEWORK will alert you as key dates approach."},{id:"mod-5",title:"Subcontractor Compliance",body:`SITEWORK maintains a compliance register for every subcontractor \u2014 public liability insurance expiry, workers compensation expiry, and SWMS (Safe Work Method Statement) status. The register uses traffic light RAG coding: green is current, amber is expiring within 60 days, red is expired.

Expired compliance blocks a subcontractor from appearing as available on new projects. The Dashboard compliance alert surfaces all issues so nothing is missed before someone steps on site.`,tip:"Request updated certificates as part of your PO process, not separately. Attaching compliance to payment is the most effective enforcement mechanism."},{id:"mod-6",title:"Site Diary",body:`The Site Diary is a legally important document. In disputes, a contemporaneous daily record of weather, workers, subcontractors on site, progress and incidents is critical evidence. SITEWORK makes it easy to log entries from the field \u2014 each entry records weather conditions, worker and hour counts, which subs were on site, notes and any incidents.
